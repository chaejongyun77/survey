<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8081 시뮬레이터 — 설문 iframe 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans" x-data="simulator()" x-init="init()">

<!-- ===================== 메인 카드 ===================== -->
<div class="max-w-2xl mx-auto pt-16 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

        <!-- 헤더 -->
        <div class="mb-8">
            <span class="inline-block bg-orange-100 text-orange-500 text-xs font-bold px-2.5 py-1 rounded-md mb-3">
                8081 시뮬레이터
            </span>
            <h1 class="text-xl font-bold text-gray-900">설문 iframe 플로우 테스트</h1>
            <p class="text-sm text-gray-400 mt-1">
                실제 8081이 수행하는 API 호출 → 토큰 수신 → iframe 렌더링 흐름을 테스트합니다.
            </p>
        </div>

        <!-- 사원번호 입력 -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">사원번호</label>
            <div class="flex gap-3">
                <input
                    type="text"
                    x-model="empNo"
                    @keydown.enter="checkSurvey"
                    placeholder="사원번호 입력"
                    class="flex-1 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
                />
                <button
                    @click="checkSurvey"
                    :disabled="loading"
                    class="px-6 py-3 bg-[#FF6A00] text-white font-bold rounded-xl text-sm hover:bg-[#E55E00] transition-colors focus:outline-none focus:ring-2 focus:ring-[#FF6A00] focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span x-show="!loading">설문 확인</span>
                    <span x-show="loading" x-cloak>확인 중...</span>
                </button>
            </div>
        </div>

        <!-- 로그 패널 -->
        <div class="bg-gray-50 rounded-xl border border-gray-200 p-4 min-h-[200px]">
            <div class="flex items-center justify-between mb-3">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">로그</p>
                <button
                    @click="logs = []"
                    x-show="logs.length > 0"
                    x-cloak
                    class="text-xs text-gray-300 hover:text-gray-500 transition-colors"
                >
                    지우기
                </button>
            </div>

            <!-- 로그 없을 때 -->
            <p x-show="logs.length === 0" class="text-xs text-gray-300 font-mono">
                사원번호를 입력하고 설문 확인 버튼을 눌러보세요.
            </p>

            <!-- 로그 목록 -->
            <div class="space-y-1.5">
                <template x-for="(entry, i) in logs" :key="i">
                    <p class="text-xs font-mono" :class="entry.color">
                        <span class="text-gray-300" x-text="`[${entry.time}]`"></span>
                        <span x-text="entry.icon + ' ' + entry.msg"></span>
                    </p>
                </template>
            </div>
        </div>

    </div>
</div>

<!-- ===================== iframe 모달 ===================== -->
<div
    x-show="modalOpen"
    x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/50 z-50 flex justify-center items-center"
    @click.self="closeModal"
>
    <div class="relative w-full mx-4" style="width: min(960px, 95vw)">
        <!-- 닫기 버튼 -->
        <button
            @click="closeModal"
            class="absolute -top-3 -right-3 z-10 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow-md text-gray-400 hover:text-gray-700 border border-gray-200 transition-colors"
        >
            ✕
        </button>
        <iframe
            x-ref="surveyIframe"
            :src="iframeUrl"
            class="w-full rounded-2xl shadow-2xl border-0"
            style="height: 85vh;"
        ></iframe>
    </div>
</div>

<script>
    function simulator() {
        return {
            empNo: 'admin',
            loading: false,
            logs: [],
            modalOpen: false,
            iframeUrl: '',

            init() {
                // postMessage 수신 리스너 등록
                window.addEventListener('message', (event) => {
                    const { action, empNo } = event.data ?? {};
                    if (!action) return;

                    this.addLog(`postMessage 수신: action="${action}"${empNo ? `, empNo="${empNo}"` : ''}`, 'recv');

                    if (action === 'CLOSE_SURVEY_MODAL') {
                        this.addLog('→ 모달 닫기 처리', 'info');
                        this.closeModal();

                    } else if (action === 'START_SURVEY') {
                        this.addLog(`→ 설문 시작 (iframe 내부 이동 처리)`, 'success');
                    }
                });
            },

            // STEP 1: 설문 체크 API 호출
            async checkSurvey() {
                const empNo = this.empNo.trim();
                if (!empNo) {
                    this.addLog('사원번호를 입력하세요.', 'warn');
                    return;
                }

                this.logs = [];
                this.loading = true;
                this.addLog(`GET /api/internal/v1/thinkbig/surveys/check?empNo=${empNo}`, 'info');

                try {
                    const res = await axios.get(
                        `/api/internal/v1/thinkbig/surveys/check?empNo=${encodeURIComponent(empNo)}`
                    );
                    const token = res.data.data;

                    this.addLog(`응답 수신: token=${token ?? 'null'}`, 'recv');

                    if (!token) {
                        this.addLog('진행 중인 설문이 없습니다.', 'warn');
                        return;
                    }

                    // STEP 2: 토큰으로 iframe URL 구성 후 모달 오픈
                    const url = `/surveys/client/intro?token=${token}`;
                    this.addLog(`iframe 오픈: src="${url}"`, 'success');
                    this.openModal(url);

                } catch (e) {
                    const msg = e.response?.data?.message ?? e.message;
                    this.addLog(`API 오류: ${msg}`, 'error');
                } finally {
                    this.loading = false;
                }
            },

            openModal(url) {
                this.iframeUrl = url;
                this.modalOpen = true;
            },

            closeModal() {
                this.modalOpen = false;
                this.iframeUrl = '';
            },

            // 로그 추가 헬퍼
            addLog(msg, type = 'info') {
                const colorMap = {
                    info:    'text-gray-600',
                    success: 'text-green-600',
                    error:   'text-red-500',
                    warn:    'text-yellow-600',
                    recv:    'text-blue-600',
                };
                const iconMap = {
                    info: '→', success: '✓', error: '✗', warn: '⚠', recv: '←',
                };
                this.logs.push({
                    msg,
                    color: colorMap[type] ?? colorMap.info,
                    icon:  iconMap[type]  ?? '→',
                    time:  new Date().toLocaleTimeString('ko-KR', { hour12: false }),
                });
            }
        }
    }
</script>
</body>
</html>
