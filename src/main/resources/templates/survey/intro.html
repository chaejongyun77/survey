<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문 인트로</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- axios (Alpine보다 먼저 로드) -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- ✦ Alpine.data() 컴포넌트는 defer Alpine보다 먼저 등록되어야 하므로 일반 script 로 선언 -->
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('surveyIntro', () => ({

            // ═══════════════════════════════════════════════
            // 상태(State)
            // ═══════════════════════════════════════════════
            survey:    {},
            surveyId:  null,
            isLoading: true,
            isError:   false,

            // ═══════════════════════════════════════════════
            // 초기화 — 서버에서 data 속성으로 심어준 surveyId 읽고 조회
            // ═══════════════════════════════════════════════
            async init() {
                this.surveyId = this.$el.dataset.surveyId ?? null;

                if (!this.surveyId) {
                    this.isError   = true;
                    this.isLoading = false;
                    return;
                }

                try {
                    const res = await axios.get(`/api/external/v1/thinkbig/surveys/${this.surveyId}/intro`);
                    this.survey = res.data.data;
                } catch (e) {
                    console.error('설문 인트로 조회 실패:', e);
                    this.isError = true;
                } finally {
                    this.isLoading = false;
                }
            },

            // ═══════════════════════════════════════════════
            // 이벤트 핸들러
            // ═══════════════════════════════════════════════

            /** "다음에 참여" → 부모(8081)에게 모달 닫기 요청 */
            onClose() {
                window.parent.postMessage({ action: 'CLOSE_SURVEY_MODAL' }, '*');
            },

            /** "참여하기" → iframe 내부에서 설문 참여 페이지로 이동 */
            onStart() {
                if (!this.surveyId) {
                    alert('설문 정보를 확인할 수 없습니다.');
                    return;
                }
                window.location.href = `/surveys/client/response?surveyId=${this.surveyId}`;
            },

            // ═══════════════════════════════════════════════
            // 포맷팅 유틸
            // ═══════════════════════════════════════════════

            formatPeriod(beginDate, endDate) {
                if (!beginDate || !endDate) return '';
                return `${this.formatDate(beginDate)} ~ ${this.formatDate(endDate)}`;
            },

            formatDate(isoString) {
                const d = new Date(isoString);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}.${m}.${day}`;
            }
        }));
    });
    </script>

    <!-- Alpine.js (defer) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-transparent font-sans antialiased m-0 p-0 flex justify-center items-center min-h-screen">

<!--
    Thymeleaf가 서버에서 렌더링한 surveyId 를
    data 속성으로 article 에 심어두고, Alpine 이 this.$el.dataset 으로 읽음.
    → URL 파라미터 노출 없이 안전하게 전달
-->
<article
    class="w-full max-w-3xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col p-6 md:p-8 m-4 max-h-[90vh] overflow-y-auto"
    th:data-survey-id="${surveyId}"
    x-data="surveyIntro"
>
    <!-- 로딩 -->
    <div x-show="isLoading" x-cloak class="flex flex-col justify-center items-center py-20 gap-3">
        <svg class="animate-spin h-6 w-6 text-[#FF6A00]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span class="text-gray-400 text-sm">설문 정보를 불러오는 중...</span>
    </div>

    <!-- 에러 -->
    <div x-show="isError" x-cloak class="flex flex-col justify-center items-center py-20 gap-2">
        <span class="text-red-400 text-sm font-medium">설문 정보를 불러올 수 없습니다.</span>
        <span class="text-gray-400 text-xs">잠시 후 다시 시도해주세요.</span>
    </div>

    <!-- 본문 -->
    <template x-if="!isLoading && !isError">
        <div class="flex flex-col h-full">

            <!-- 헤더: 상태 배지 + 제목 -->
            <header class="mb-6">
                <span
                    class="inline-flex items-center px-3 py-1.5 rounded-md text-[12px] font-bold mb-4 bg-[#FFF2EB] text-[#FF6A00]"
                >진행중</span>
                <h1
                    class="text-2xl font-bold text-gray-900 leading-snug tracking-tight"
                    x-text="survey.title"
                ></h1>
            </header>

            <!-- 로고 -->
            <div class="w-full mb-8 flex justify-center items-center py-6">
                <img th:src="@{/images/logo.png}" alt="웅진씽크빅 로고" class="max-h-16 object-contain" />
            </div>

            <hr class="border-t border-gray-100 mb-8" />

            <!-- 설문 정보 -->
            <dl class="space-y-4 text-base">
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">설문 기간</dt>
                    <dd class="text-gray-800 font-medium" x-text="formatPeriod(survey.beginDate, survey.endDate)"></dd>
                </div>
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">설문 대상</dt>
                    <dd class="text-gray-800 font-medium" x-text="survey.targetCount + '명'"></dd>
                </div>
            </dl>

            <!-- 하단 버튼 -->
            <footer class="mt-auto pt-10 flex gap-4">
                <button
                    type="button"
                    class="flex-1 py-4 bg-gray-100 text-gray-600 font-bold rounded-xl text-base transition-colors hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300"
                    @click="onClose"
                >
                    다음에 참여
                </button>
                <button
                    type="button"
                    class="flex-[2] py-4 bg-[#FF6A00] text-white font-bold rounded-xl text-base transition-colors hover:bg-[#E55E00] focus:outline-none focus:ring-2 focus:ring-[#FF6A00] focus:ring-offset-2"
                    @click="onStart"
                >
                    참여하기
                </button>
            </footer>

        </div>
    </template>
</article>

</body>
</html>
