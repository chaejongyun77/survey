<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문 인트로</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-transparent font-sans antialiased m-0 p-0 flex justify-center items-center min-h-screen">


<article
    class="w-full max-w-3xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col p-6 md:p-8 m-4 max-h-[90vh] overflow-y-auto"
    th:data-survey-id="${surveyId}"
    x-data="surveyIntro"
    @draft-modal-confirm.window="onResume"
    @draft-modal-cancel.window="onFresh"
>
    <!-- 로딩 -->
    <div x-show="isLoading" x-cloak class="flex flex-col justify-center items-center py-20 gap-3">
        <svg class="animate-spin h-6 w-6 text-[#FF6A00]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span class="text-gray-400 text-sm">설문 정보를 불러오는 중...</span>
    </div>

    <!-- 에러 -->
    <div x-show="isError" x-cloak class="flex flex-col justify-center items-center py-20 gap-2">
        <span class="text-red-400 text-sm font-medium">설문 정보를 불러올 수 없습니다.</span>
        <span class="text-gray-400 text-xs">잠시 후 다시 시도해주세요.</span>
    </div>

    <!-- 본문 -->
    <template x-if="!isLoading && !isError">
        <div class="flex flex-col h-full">

            <!-- 헤더: 상태 배지 + 제목 -->
            <header class="mb-6">
                <span
                    class="inline-flex items-center px-3 py-1.5 rounded-md text-[12px] font-bold mb-4 bg-[#FFF2EB] text-[#FF6A00]"
                >진행중</span>
                <h1
                    class="text-2xl font-bold text-gray-900 leading-snug tracking-tight"
                    x-text="survey.title"
                ></h1>
            </header>

            <!-- 로고 -->
            <div class="w-full mb-8 flex justify-center items-center py-6">
                <img th:src="@{/images/logo.png}" alt="웅진씽크빅 로고" class="max-h-16 object-contain" />
            </div>

            <hr class="border-t border-gray-100 mb-8" />

            <!-- 설문 정보 -->
            <dl class="space-y-4 text-base">
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">설문 기간</dt>
                    <dd class="text-gray-800 font-medium" x-text="formatPeriod(survey.beginDate, survey.endDate)"></dd>
                </div>
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">설문 대상</dt>
                    <dd class="text-gray-800 font-medium" x-text="survey.targetCount + '명'"></dd>
                </div>
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">총 문항 수</dt>
                    <dd class="text-gray-800 font-medium" x-text="survey.questionCount + '문항'"></dd>
                </div>
            </dl>

            <!-- 하단 버튼 -->
            <footer class="mt-auto pt-10 flex gap-4">
                <button
                    type="button"
                    class="flex-1 py-4 bg-gray-100 text-gray-600 font-bold rounded-xl text-base transition-colors hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300"
                    @click="onClose"
                >
                    다음에 참여
                </button>
                <button
                    type="button"
                    class="flex-[2] py-4 bg-[#FF6A00] text-white font-bold rounded-xl text-base transition-colors hover:bg-[#E55E00] focus:outline-none focus:ring-2 focus:ring-[#FF6A00] focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    @click="onStart"
                    :disabled="isStarting"
                >
                    <span x-show="!isStarting">참여하기</span>
                    <span x-show="isStarting" class="flex items-center justify-center gap-2">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"/>
                            <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                        확인 중...
                    </span>
                </button>
            </footer>

        </div>
    </template>

    <!-- 임시저장 확인 모달 -->
    <div th:replace="~{fragments/modal :: confirmModal(
        title='이어서 작성하시겠습니까?',
        message='이전에 임시저장된 내용이 있습니다.',
        cancelLabel='새로 시작',
        confirmLabel='이어서 작성',
        eventKey='draft-modal'
    )}"></div>

</article>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('surveyIntro', () => ({
            survey:     {},
            surveyId:   null,
            isLoading:  true,
            isError:    false,
            isStarting: false,

            async init() {
                this.surveyId = this.$el.dataset.surveyId ?? null;

                if (!this.surveyId) {
                    this.isError   = true;
                    this.isLoading = false;
                    return;
                }

                try {
                    const res = await axios.get(`/api/external/v1/thinkbig/surveys/${this.surveyId}/intro`);
                    this.survey = res.data.data;
                } catch (e) {
                    console.error('설문 인트로 조회 실패:', e);
                    this.isError = true;
                } finally {
                    this.isLoading = false;
                }
            },

            /** "다음에 참여" → 부모(8081)에게 모달 닫기 요청 */
            onClose() {
                window.parent.postMessage({ action: 'CLOSE_SURVEY_MODAL' }, '*');
            },

            /** "참여하기" → ① 참여 가능 검증 → ② 임시저장 여부 확인 → ③ 이동 또는 모달 */
            async onStart() {
                if (!this.surveyId) {
                    alert('설문 정보를 확인할 수 없습니다.');
                    return;
                }

                this.isStarting = true;
                try {
                    // ① 참여 가능 여부 검증
                    const res = await axios.post(
                        `/api/external/v1/thinkbig/surveys/${this.surveyId}/participate`
                    );
                    if (!res.data.success) {
                        alert(res.data.message);
                        return;
                    }

                    // ② 임시저장 존재 여부 확인
                    const draftRes = await axios.get(
                        `/api/external/v1/thinkbig/surveys/${this.surveyId}/draft`
                    );
                    const hasDraft = Array.isArray(draftRes.data?.data) && draftRes.data.data.length > 0;

                    if (hasDraft) {
                        // ③-A 임시저장 있음 → 모달 표시
                        this.$dispatch('show-draft-modal');
                    } else {
                        // ③-B 임시저장 없음 → 바로 이동
                        this.navigate();
                    }
                } catch (e) {
                    console.error('참여 검증 실패:', e);
                    alert('일시적인 오류가 발생했습니다.');
                } finally {
                    this.isStarting = false;
                }
            },

            /** 이어서 작성 — draft 유지한 채 이동 */
            onResume() {
                this.navigate();
            },

            /** 새로 시작 — draft 삭제 후 이동 */
            async onFresh() {
                try {
                    await axios.post(
                        `/api/external/v1/thinkbig/surveys/${this.surveyId}/draft/delete`
                    );
                } catch (e) {
                    console.warn('임시저장 삭제 실패 (무시):', e);
                }
                this.navigate();
            },

            navigate() {
                window.location.href = `/surveys/client/response?surveyId=${this.surveyId}`;
            },

            formatPeriod(beginDate, endDate) {
                if (!beginDate || !endDate) return '';
                return `${this.formatDate(beginDate)} ~ ${this.formatDate(endDate)}`;
            },

            formatDate(isoString) {
                const d = new Date(isoString);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}.${m}.${day}`;
            }
        }));
    });
</script>

</body>
</html>
