<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문 인트로</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-transparent font-sans antialiased m-0 p-0 flex justify-center items-center min-h-screen">

<article
    class="w-full max-w-3xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col p-6 md:p-8 m-4 max-h-[90vh] overflow-y-auto"
    x-data="surveyIntro()"
    x-init="fetchIntro()"
>
    <!-- 로딩 -->
    <div x-show="isLoading" class="flex justify-center items-center py-20">
        <span class="text-gray-400 text-sm">불러오는 중...</span>
    </div>

    <!-- 에러 -->
    <div x-show="isError" class="flex justify-center items-center py-20">
        <span class="text-red-400 text-sm">설문 정보를 불러올 수 없습니다.</span>
    </div>

    <!-- 본문 -->
    <template x-if="!isLoading && !isError">
        <div class="flex flex-col">

            <header class="mb-6">
                <!-- 진행중 / 종료 상태 배지 -->
                <span
                    class="inline-flex items-center px-3 py-1.5 rounded-md text-[12px] font-bold mb-4"
                    :class="survey.inProgress
                        ? 'bg-[#FFF2EB] text-[#FF6A00]'
                        : 'bg-gray-100 text-gray-400'"
                    x-text="survey.status"
                ></span>

                <!-- 설문 제목 -->
                <h1 class="text-2xl font-bold text-gray-900 leading-snug tracking-tight" x-text="survey.title"></h1>
            </header>

            <!-- 로고 -->
            <div class="w-full mb-8 flex justify-center items-center py-6">
                <img th:src="@{/images/logo.png}" alt="웅진씽크빅 로고" class="max-h-16 object-contain" />
            </div>

            <hr class="border-t border-gray-100 mb-8" />

            <dl class="space-y-4 text-base">
                <!-- 설문 기간 -->
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">설문 기간</dt>
                    <dd class="text-gray-800 font-medium" x-text="survey.period"></dd>
                </div>
                <!-- 설문 대상 -->
                <div class="flex items-start">
                    <dt class="w-24 shrink-0 text-gray-500">설문 대상</dt>
                    <dd class="text-gray-800 font-medium" x-text="survey.targetCount + '명'"></dd>
                </div>
            </dl>

            <footer class="mt-auto pt-10 flex gap-4">
                <button
                    type="button"
                    class="flex-1 py-4 bg-gray-100 text-gray-600 font-bold rounded-xl text-base transition-colors hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300"
                    @click="onClose"
                >
                    다음에 참여
                </button>
                <button
                    type="button"
                    class="flex-[2] py-4 bg-[#FF6A00] text-white font-bold rounded-xl text-base transition-colors hover:bg-[#E55E00] focus:outline-none focus:ring-2 focus:ring-[#FF6A00] focus:ring-offset-2"
                    @click="onStart"
                >
                    참여하기
                </button>
            </footer>
        </div>
    </template>
</article>

<script>
    function surveyIntro() {
        return {
            survey: {},
            isLoading: true,
            isError: false,

            // URL 파라미터에서 surveyId, userId 추출
            surveyId: new URLSearchParams(window.location.search).get('surveyId'),
            userId:   new URLSearchParams(window.location.search).get('userId'),

            async fetchIntro() {
                if (!this.surveyId) {
                    this.isError = true;
                    this.isLoading = false;
                    return;
                }

                try {
                    const res = await axios.get(`/api/surveys/${this.surveyId}/intro`);
                    this.survey = res.data.data;
                } catch (e) {
                    console.error('설문 인트로 조회 실패:', e);
                    this.isError = true;
                } finally {
                    this.isLoading = false;
                }
            },

            onClose() {
                window.parent.postMessage({ action: 'CLOSE_SURVEY_MODAL', userId: this.userId }, '*');
            },

            onStart() {
                if (!this.userId) {
                    alert('사용자 정보(userId)를 확인할 수 없습니다.');
                    return;
                }
                window.parent.postMessage({ action: 'START_SURVEY', userId: this.userId }, '*');
            }
        }
    }
</script>
</body>
</html>
