<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<!--
  공통 확인 모달 컴포넌트

  파라미터:
    title        - 모달 제목
    message      - 본문 메시지
    cancelLabel  - 왼쪽(보조) 버튼 텍스트
    confirmLabel - 오른쪽(주요) 버튼 텍스트
    eventKey     - 이벤트 식별자 (기본값: 'confirm-modal')

  사용법:
    1. 삽입:
         <div th:replace="~{fragments/modal :: confirmModal(
             title='제목',
             message='메시지',
             cancelLabel='취소',
             confirmLabel='확인',
             eventKey='my-modal'
         )}"></div>

    2. 열기:
         window.dispatchEvent(new CustomEvent('show-my-modal'))
         또는 Alpine 내에서: this.$dispatch('show-my-modal')

    3. 결과 수신 (사용하는 컴포넌트 루트에 리스너 추가):
         @my-modal-cancel.window="..."   — 왼쪽 버튼 클릭 시
         @my-modal-confirm.window="..."  — 오른쪽 버튼 클릭 시
-->
<div th:fragment="confirmModal(title, message, cancelLabel, confirmLabel, eventKey)"
     th:with="ek=${eventKey} ?: 'confirm-modal'"
     th:data-event-key="${ek}"
     x-data="{ show: false, eventKey: '' }"
     x-init="eventKey = $el.dataset.eventKey; window.addEventListener('show-' + eventKey, () => show = true)"
     x-show="show" x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-6">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
        <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-orange-500" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
            </svg>
        </div>
        <h2 class="text-center text-gray-900 font-bold text-lg mb-1"
            th:text="${title} ?: '확인하시겠습니까?'"></h2>
        <p class="text-center text-gray-500 text-sm mb-6"
           th:text="${message} ?: ''"></p>
        <div class="flex gap-3">
            <button @click="show = false; window.dispatchEvent(new CustomEvent(eventKey + '-cancel'))"
                    class="flex-1 py-3 bg-gray-100 text-gray-600 font-semibold rounded-xl text-sm
                           hover:bg-gray-200 transition-colors"
                    th:text="${cancelLabel} ?: '취소'">
            </button>
            <button @click="show = false; window.dispatchEvent(new CustomEvent(eventKey + '-confirm'))"
                    class="flex-[2] py-3 bg-[#FF6A00] text-white font-semibold rounded-xl text-sm
                           hover:bg-[#E55E00] transition-colors"
                    th:text="${confirmLabel} ?: '확인'">
            </button>
        </div>
    </div>
</div>

</body>
</html>
