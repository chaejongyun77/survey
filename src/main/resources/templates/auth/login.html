<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 웅진씽크빅 설문 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style> [x-cloak] { display: none !important; } </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-gray-100 flex items-center justify-center min-h-screen">

<div x-data="loginComponent()" class="bg-white w-[360px] px-10 py-12 rounded-lg shadow-md">
    <div class="text-center mb-8">
        <h1 class="text-[22px] font-bold text-[#FF6B00]">웅진씽크빅</h1>
        <p class="text-[13px] text-gray-400 mt-2">설문 관리 서비스</p>
    </div>

    <div x-cloak
         x-show="errorMessage"
         x-text="errorMessage"
         class="mb-4 px-4 py-2 rounded text-[13px] text-center bg-red-50 text-red-600 border border-red-200">
    </div>

    <form @submit.prevent="submitLogin">
        <div class="mb-4">
            <label for="loginId" class="block text-[13px] text-gray-600 mb-1.5">아이디</label>
            <input type="text" id="loginId" x-model="loginId" placeholder="아이디를 입력하세요" required autocomplete="username" class="w-full px-3.5 py-2.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-600">
        </div>

        <div class="mb-4">
            <label for="password" class="block text-[13px] text-gray-600 mb-1.5">비밀번호</label>
            <input type="password" id="password" x-model="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password" class="w-full px-3.5 py-2.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-600">
        </div>

        <button type="submit" :disabled="isLoading" class="w-full mt-2 py-3 bg-[#FF6B00] hover:bg-[#E55F00] text-white text-[15px] font-semibold rounded transition-colors disabled:opacity-50">
            <span x-text="isLoading ? '로그인 중...' : '로그인'"></span>
        </button>
    </form>
</div>

<script>
    if (window.location.search) {
        history.replaceState(null, '', window.location.pathname);
    }

    function loginComponent() {
        return {
            loginId: '',
            password: '',
            errorMessage: '',
            isLoading: false,

            async submitLogin() {
                this.errorMessage = '';
                this.isLoading = true;

                try {
                    // 2. Axios를 사용한 POST 요청 (코드 대폭 감소)
                    const response = await axios.post('/api/external/v1/admin/auth/login', {
                        loginId: this.loginId,
                        password: this.password
                    });

                    // 3. JSON 파싱 없이 바로 data 접근
                    const result = response.data;

                    if (result.success) {
                        window.location.href = '/surveys';
                    } else {
                        this.errorMessage = result.message;
                    }
                } catch (error) {
                    console.error('로그인 통신 중 오류:', error);

                    // 4. Axios의 에러 핸들링 (400, 500번대 에러가 모두 이곳으로 옴)
                    if (error.response && error.response.data && error.response.data.message) {
                        // 서버에서 내려준 에러 메시지가 있는 경우 (예: 비밀번호 틀림 등)
                        this.errorMessage = error.response.data.message;
                    } else {
                        // 서버가 죽었거나 네트워크가 끊긴 경우
                        this.errorMessage = '서버와 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
                    }
                } finally {
                    this.isLoading = false;
                }
            }
        }
    }
</script>
</body>
</html>
