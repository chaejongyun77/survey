<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 웅진씽크빅 설문 서비스</title>
    <script th:src="@{/js/tailwind.min.js}"></script>
    <script th:src="@{/js/tailwind.config.js}"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white w-[360px] px-10 py-12 rounded-lg shadow-md">

    <!-- 헤더 -->
    <div class="text-center mb-8">
        <h1 class="text-[22px] font-bold text-primary">웅진씽크빅</h1>
        <p class="text-[13px] text-gray-400 mt-2">설문 관리 서비스</p>
    </div>

    <!-- 에러 메시지 -->
    <div th:if="${errorMsg}"
         class="mb-4 px-4 py-2 rounded text-[13px] text-center bg-red-50 text-red-600 border border-red-200"
         th:text="${errorMsg}">
    </div>

    <!-- 로그아웃 메시지 -->
    <div th:if="${logoutMsg}"
         class="mb-4 px-4 py-2 rounded text-[13px] text-center bg-green-50 text-green-700 border border-green-200"
         th:text="${logoutMsg}">
    </div>

    <!--
        POST /auth/login 은 AuthController가 직접 처리
        → AuthService.login() → 토큰 발급 → 쿠키 세팅 → /surveys 리다이렉트
    -->
    <form th:action="@{/auth/login}" method="post">

        <!-- 아이디 -->
        <div class="mb-4">
            <label for="loginId" class="block text-[13px] text-gray-600 mb-1.5">아이디</label>
            <input type="text"
                   id="loginId"
                   name="loginId"
                   placeholder="아이디를 입력하세요"
                   required
                   class="w-full px-3.5 py-2.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-primary">
        </div>

        <!-- 비밀번호 -->
        <div class="mb-4">
            <label for="password" class="block text-[13px] text-gray-600 mb-1.5">비밀번호</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="비밀번호를 입력하세요"
                   required
                   class="w-full px-3.5 py-2.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-primary">
        </div>

        <!-- 로그인 버튼 -->
        <button type="submit"
                class="w-full mt-2 py-3 bg-primary hover:bg-primary-hover text-white text-[15px] font-semibold rounded transition-colors">
            로그인
        </button>

    </form>
</div>

</body>
</html>
