<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 웅진씽크빅 설문 서비스</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-box">
    <h1>웅진씽크빅</h1>
    <p class="subtitle">설문 관리 서비스</p>

    <div th:if="${errorMsg}"  class="alert alert-error"   th:text="${errorMsg}"></div>
    <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>

    <!--
        POST /auth/login 은 Spring Security가 직접 처리
        input name은 SecurityConfig의 usernameParameter/passwordParameter와 일치해야 함
    -->
    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label for="loginId">아이디</label>
            <input type="text" id="loginId" name="loginId" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn-login">로그인</button>
    </form>
</div>

</body>
</html>
